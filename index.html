<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testable To-Do Item Card</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>


  <section data-testid="test-todo-card">
        <header class="todo-header">
            <div class="todo-header-left">
                <img src="./images/Hamburger-menu.svg" alt="Hamburger menu icon" class="hamburger-icon">
                <span>Today's Focus</span>
            </div>

            <div>
                <img src="./images/Search-icon.svg" alt="Search icon" class="search-icon">
            </div>
            
        </header>   
        
        
        <section class="todo-container">
            <div class="todo-task-details">
                <h4 class="todo-curation">CURATION / WORKSPACE</h4>
                <h2 class="todo-task-title">Task Details</h2>

            </div>

           <div class="todo-card">
                <div class="todo-card-first-section">
                    <div class="todo-priority-progress">
                        <div class="to-do-select">
                            <p data-testid="test-todo-priority"> Low-Prority
                                <!-- <option class="to-do-option" value="Low">LOW-PRIORITY</option>
                                <option class="to-do-option" value="Medium">MEDIUM-PRIORITY</option>
                                <option class="to-do-option" value="High">HIGH-PRIORITY</option> -->
                            </p>
    
                        </div>
    
                        <div class="to-do-select">
                           
                            <p data-testid="test-todo-status" id="workspace"> In Progress
                                <!-- <option class="to-do-option" value="default">NOT STARTED</option>
                                <option class="to-do-option" value="work">IN PROGRESS</option>
                                <option class="to-do-option" value="personal">DONE</option> -->
                            </p>
    
                        </div>

                    </div>
                    
                    <input data-testid="test-todo-complete-toggle" type="checkbox">
                    
                </div>

                    <div class="todo-card-second-section">
                        <h2 data-testid="test-todo-title">Review Design Specs</h2>
                        <p data-testid="test-todo-description">Go through the new Figma components and provide feedback to the design team regarding the editorial scale and tonal layering transitions.</p>
                        <div class="todo-work-urgent">
                            <p class="test-todo-tags">#Work</p>
                            <p class="test-todo-tags todo-work-paragraph">#Urgent</p>
                        </div>

                        <div class="todo-due-date">
                            <div class="due-date">
                                <p class="due-date-para">Due Date</p>
                                <input type="date" data-testid="test-todo-due-date">

                            </div>

                            <div class="due-date">
                                <p class="due-date-para">Remaining</p>
                                <span data-testid="test-todo-time-remaining">pending...</span>

                            </div>
                            
                        </div>

                        <div class="todo-edit-delete-button">
                            <button data-testid="test-todo-edit-button">Edit</button>
                            <button data-testid="test-todo-delete-button">Delete</button>
                        </div>
                    </div>
            </div> 
            <form action="" data-testid="test-todo-edit-form">
                <div data-testclass="test-todo-edit-class">
                    <label data-testclass="test-todo-edit-label" for="edit-title">Task Title</label>
                    <input data-testid="test-todo-edit-title-input" type="text" name="edit-title" placeholder="Type your task title">
                </div>

                <div data-testclass="test-todo-edit-class">
                    <label data-testclass="test-todo-edit-label" for="edit-description">Description</label>
                    <textarea data-testid="test-todo-edit-description-input" name="edit-description" cols="30" rows="10" placeholder="Describe your task description"></textarea>
                </div>

                <div data-testclass="test-todo-priority-status">
                    <select data-testid="test-todo-edit-priority-select" name="edit-priority" id="edit-priority">
                        <option value="Low">LOW-PRIORITY</option>
                        <option value="Medium">MEDIUM-PRIORITY</option>
                        <option value="High">HIGH-PRIORITY</option>
                    </select>
    
                    <select data-testid="test-todo-status-control" name="edit-status">
                        <option value="Not Started">NOT STARTED</option>
                        <option value="In Progress">IN PROGRESS</option>
                        <option value="Completed">COMPLETED</option>
                    </select>
                </div>
                
                <div data-testclass="test-todo-edit-class">
                    <label data-testclass="test-todo-edit-label"for="edit-due-date">Due Date</label>
                    <input data-testid="test-todo-edit-due-date-input" type="date" name="edit-due-date" id="edit-due-date">
                </div>

                <div data-testclass="test-todo-edit-button-container">
                    <button data-testid="test-todo-save-button" type="button">Save</button>
                    <button data-testid="test-todo-cancel-button" type="button">Cancel</button>
                </div>
                
            </form>
                
            </div>
           


        </section>
            
     <script src="./index.js"></script>

    </section>
